name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*_cuda-*_jl-*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Dockerfile
    runs-on: ubuntu-latest
    # bound the run: --check resolves base-image metadata from a registry, so a
    # slow/unreachable Docker Hub must not hang against the 6h default timeout
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # BuildKit's built-in linter (buildx build --check) is used instead of
      # hadolint: hadolint cannot parse Dockerfile heredocs (RUN <<-EOF), the
      # form this repo's Dockerfile convention mandates, so every hadolint run
      # aborts with a parse error and lints nothing. --check uses Docker's own
      # parser, understands heredocs, and honours the in-Dockerfile `# check=`
      # directives. It exits non-zero on any rule violation.
      #
      # The runner's preinstalled buildx is used directly (no setup-buildx-action):
      # its default `docker` driver matches how --check was verified, and buildx
      # on ubuntu-latest is far newer than v0.15 which introduced --check. --check
      # only resolves base-image metadata (public nvidia/cuda images); it does not
      # build. The Dockerfile's own ARG defaults make --build-arg unnecessary.
      - name: Lint Dockerfile with buildx build --check
        run: |
          docker buildx build --check \
            -f services/jupyterlab/Dockerfile.jupyterlab \
            services/jupyterlab

  test:
    name: duoptimum-lab-utils tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # install the package (pulls pyyaml, textual>=2, rich) plus pytest; the
      # textual TUI tests drive App.run_test headlessly via asyncio.run, so no
      # display, TTY or pytest-asyncio plugin is needed on the runner
      - name: Install duoptimum-lab-utils with test dependencies
        run: pip install ./services/jupyterlab/duoptimum-lab-utils pytest

      - name: Run pytest
        working-directory: services/jupyterlab/duoptimum-lab-utils
        run: pytest
